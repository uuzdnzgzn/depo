<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambar — Araç Kutusu</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #0b0b0e;
  color: #f0f0f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden; /* Yatay taşmayı gizle */
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

.glow {
  position: fixed;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(232,255,71,0.07) 0%, transparent 70%);
  pointer-events: none;
}

/* MARKA */
.brand {
  position: fixed;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10;
}

.brand-dot {
  width: 7px; height: 7px;
  background: #e8ff47;
  border-radius: 50%;
  animation: blink 2.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.5)} }

.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* DOCK - YATAY DİZİLİM AYARLARI */
.dock {
  display: flex;
  flex-direction: row; /* Yan yana diz */
  flex-wrap: nowrap;    /* Alt satıra geçmeyi zorla engelle */
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 40px;
  position: relative;
  z-index: 5;
  width: max-content;   /* İçeriği kadar genişlesin */
  max-width: 95vw;
}

/* ARAÇ İTEMİ */
.tool-item {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  text-decoration: none;
  opacity: 0;
  animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1) forwards;
  flex-shrink: 0; /* İkonların sıkışmasını engeller */
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.6) translateY(10px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

.tool-icon-wrap {
  width: 66px; height: 66px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  border: 1px solid #1c1c2a;
  background: #111118;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
}

.tool-item:hover .tool-icon-wrap {
  transform: scale(1.2) translateY(-5px);
}

/* Renkler */
.tool-item[data-color="yellow"]:hover .tool-icon-wrap { border-color: #e8ff47; box-shadow: 0 10px 30px rgba(232,255,71,0.15); }
.tool-item[data-color="blue"]:hover .tool-icon-wrap { border-color: #47c2ff; box-shadow: 0 10px 30px rgba(71,194,255,0.15); }
.tool-item[data-color="purple"]:hover .tool-icon-wrap { border-color: #a78bfa; box-shadow: 0 10px 30px rgba(167,139,250,0.15); }
.tool-item[data-color="green"]:hover .tool-icon-wrap { border-color: #34d399; box-shadow: 0 10px 30px rgba(52,211,153,0.15); }
.tool-item[data-color="orange"]:hover .tool-icon-wrap { border-color: #fb923c; box-shadow: 0 10px 30px rgba(251,146,60,0.15); }
.tool-item[data-color="red"]:hover .tool-icon-wrap { border-color: #ff6b6b; box-shadow: 0 10px 30px rgba(255,107,107,0.15); }

/* TOOLTIP */
.tooltip {
  position: absolute;
  bottom: calc(100% + 15px);
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #16161f;
  border: 1px solid #24242f;
  border-radius: 12px;
  padding: 12px;
  width: 180px;
  pointer-events: none;
  opacity: 0;
  transition: all 0.2s ease;
  z-index: 100;
  text-align: center;
}

.tool-item:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

.tt-name { font-size: 13px; font-weight: 700; color: #f0f0f5; margin-bottom: 4px; }
.tt-desc { font-size: 11px; color: #666688; line-height: 1.4; }
.tt-badge { display: inline-block; margin-top: 8px; font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
.active-badge { background: rgba(232,255,71,0.1); color: #e8ff47; }
.soon-badge { background: #1e1e2a; color: #555; }

.tool-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 10px; background: #1e1e2e; }
.tool-item:not(.soon) .tool-dot { background: #e8ff47; }
.tool-item.soon .tool-icon-wrap { opacity: 0.3; filter: grayscale(1); }

.hint { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #2a2a3a; }
.counter { position: fixed; bottom: 28px; right: 32px; font-size: 11px; color: #2a2a3a; }
</style>
</head>
<body>

<div class="glow"></div>

<div class="brand">
  <div class="brand-dot"></div>
  <span class="brand-name">Ambar</span>
</div>

<div class="dock">
  <a class="tool-item" href="pdf-editor.html" data-color="yellow" style="animation-delay:0.1s">
    <div class="tool-icon-wrap">📄</div>
    <div class="tooltip">
      <div class="tt-name">PDF Editör</div>
      <div class="tt-desc">PDF'leri düzenle ve birleştir.</div>
      <span class="tt-badge active-badge">Hazır</span>
    </div>
    <div class="tool-dot"></div>
  </a>

  <a class="tool-item" href="Defter.html" data-color="blue" style="animation-delay:0.2s">
    <div class="tool-icon-wrap">📜</div>
    <div class="tooltip">
      <div class="tt-name">Defter</div>
      <div class="tt-desc">Notlarını düzenle.</div>
      <span class="tt-badge active-badge">Hazır</span>
    </div>
    <div class="tool-dot"></div>
  </a>

  <div class="tool-item soon" data-color="purple" style="animation-delay:0.3s">
    <div class="tool-icon-wrap">🖼️</div>
    <div class="tooltip">
      <div class="tt-name">Görsel</div>
      <span class="tt-badge soon-badge">Yakında</span>
    </div>
    <div class="tool-dot"></div>
  </div>

  <div class="tool-item soon" data-color="green" style="animation-delay:0.4s">
    <div class="tool-icon-wrap">📷</div>
    <div class="tooltip">
      <div class="tt-name">QR Kod</div>
      <span class="tt-badge soon-badge">Yakında</span>
    </div>
    <div class="tool-dot"></div>
  </div>

  <div class="tool-item soon" data-color="orange" style="animation-delay:0.5s">
    <div class="tool-icon-wrap">🔢</div>
    <div class="tooltip">
      <div class="tt-name">Hesapla</div>
      <span class="tt-badge soon-badge">Yakında</span>
    </div>
    <div class="tool-dot"></div>
  </div>

  <div class="tool-item soon" data-color="red" style="animation-delay:0.6s">
    <div class="tool-icon-wrap">🔐</div>
    <div class="tooltip">
      <div class="tt-name">Şifre</div>
      <span class="tt-badge soon-badge">Yakında</span>
    </div>
    <div class="tool-dot"></div>
  </div>
</div>

<div class="hint">İkonun üzerine gel → Bilgi al</div>
<div class="counter" id="counter"></div>

<script>
const active = document.querySelectorAll('.tool-item:not(.soon)').length;
const total  = document.querySelectorAll('.tool-item').length;
document.getElementById('counter').textContent = active + ' / ' + total + ' aktif';
</script>

</body>
</html>
